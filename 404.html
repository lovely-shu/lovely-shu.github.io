<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Page Not Found</title>
  <script type="text/javascript">
    // SPA Redirect Script for GitHub Pages
    (function () {
      var redirect = sessionStorage.redirect;
      delete sessionStorage.redirect;
      if (redirect && redirect !== location.href) {
        history.replaceState(null, null, redirect);
      }
    })();
  </script>
</head>
<body>
  <h1>Page Not Found</h1>
  <p>Redirecting...</p>
  <script>
    // Redirect logic
    (function () {
      // Pathname without trailing slash
      var pathname = location.pathname.replace(/\/$/, "");

      // Query parameters and hash
      var search = location.search.replace(/^\?/, "").replace(/&/g, "~and~");
      var hash = location.hash || "";

      // Redirect URL construction
      var redirectUrl = pathname + (search ? "?" + search : "") + hash;

      // Save the URL to session storage
      sessionStorage.redirect = redirectUrl;

      // Redirect to the new URL
      location.href = redirectUrl;
    })();
  </script>
</body>
</html>
